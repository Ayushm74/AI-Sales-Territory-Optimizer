version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: sales-territory-db
    environment:
      POSTGRES_DB: sales_territory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales-territory-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sales_territory_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      NODE_ENV: production
      ML_SERVICE_URL: http://ml-service:5001
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sales-territory-ml
    environment:
      PORT: 5001
    ports:
      - "5001:5001"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sales-territory-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_ML_SERVICE_URL: http://localhost:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  ml_models:

